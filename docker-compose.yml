version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: postgres_db
    environment:
      POSTGRES_DB: enterprise_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # This service runs ONCE to guarantee the vector extension exists
  # even if the postgres volume already existed (init.sql won't re-run then)
  db-init:
    image: pgvector/pgvector:pg15
    container_name: db_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command: >
      psql -h postgres -U postgres -d enterprise_copilot
      -c "CREATE EXTENSION IF NOT EXISTS vector;"
    restart: "no"

  ollama:
    image: ollama/ollama
    container_name: enterprise-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    container_name: enterprise-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      ollama:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/enterprise_copilot
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
    restart: on-failure

volumes:
  postgres_data:
  ollama_data:
