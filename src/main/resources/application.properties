spring.application.name=enterprise-ai-copilot
server.port=8080
server.compression.enabled=true
rag.similarity.threshold=0.75

# ===============================
# DATABASE (POSTGRES - DOCKER)
# ===============================
spring.datasource.url=jdbc:postgresql://postgres:5432/enterprise_copilot
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari (optimized for Docker startup delay)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===============================
# DISABLE H2
# ===============================
spring.h2.console.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# JWT
# ===============================
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# ===============================
# OLLAMA
# ===============================
ollama.base-url=http://enterprise-ollama:11434
ollama.model=llama3
ollama.embedding-model=nomic-embed-text

# ===============================
# AI CONFIG
# ===============================
ai.confidence.threshold=0.7
ai.fraud.threshold=60
ai.duplicate.amount-tolerance=0.05

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=workflow-retry-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
workflow.kafka.topic.failed=workflow.failed
workflow.kafka.topic.dlq=workflow.dlq
workflow.retry.max-attempts=3

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.enterprise.copilot=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# SWAGGER
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method